name: Deploy to EdgeOne Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EdgeOne Pages
        uses: baipeng/edgeone-pages-action@v1.1.0
        with:
          api_key: ${{ secrets.TENCENT_SECRET_KEY }}
          api_key_id: ${{ secrets.TENCENT_SECRET_ID }}
          app_id: ${{ secrets.TENCENT_APP_ID }}
          git_repo: yudaihua/yudaihua-blog
          git_branch: main
          output_dir: /
