name: Deploy to EdgeOne Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EdgeOne Pages
        uses: Yidadaa/edgeone-pages-action@v1
        with:
          secret-id: ${{ secrets.TENCENT_SECRET_ID }}
          secret-key: ${{ secrets.TENCENT_SECRET_KEY }}
          app-id: ${{ secrets.TENCENT_APP_ID }}
          git-repo: ${{ github.repository }}
          git-branch: main
          output-dir: /
