<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面走丢了 · 追番日记</title>
  <style>
    :root { --bg: #FDF8F3; --text: #2D2A26; --accent: #E8A4B8; --text-light: #6B6560; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .container h1 { font-size: 6rem; color: var(--accent); margin-bottom: 8px; }
    .container h2 { font-size: 1.5rem; margin-bottom: 16px; }
    .container p { color: var(--text-light); margin-bottom: 32px; }
    .container a { display: inline-block; padding: 10px 28px; background: var(--accent); color: #fff; border-radius: 24px; font-weight: 500; text-decoration: none; transition: transform 0.2s; }
    .container a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>这页好像走丢了...</h2>
    <p>就像一集看完没片尾曲一样突兀</p>
    <a href="/">返回首页</a>
  </div>
</body>
</html>
